<!DOCTYPE html>
<html>
<head>
    <title>Zoe</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: #00ff9c;
            font-family: "Courier New", monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* boot screen */
        #boot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            padding: 20px;
            white-space: pre-wrap;
        }

        /* main app (hidden initially) */
        #app {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        /* title */
        .title {
            text-align: center;
            padding: 10px;
            border-bottom: 1px solid #003322;
            font-size: 18px;
        }

        #chatbox {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .user {
            color: #008f5a;
            margin-bottom: 8px;
        }

        .bot {
            color: #00ff9c;
            margin-bottom: 12px;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #003322;
        }

        input {
            flex: 1;
            padding: 15px;
            background: black;
            border: none;
            color: #00ff9c;
            font-family: "Courier New", monospace;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 0 20px;
            background: black;
            border: none;
            color: #00ff9c;
            cursor: pointer;
            font-family: "Courier New", monospace;
        }

        button:hover {
            background: #001a12;
        }
    </style>
</head>

<body>

<!-- boot screen -->
<div id="boot"></div>

<!-- main app -->
<div id="app">
    <div class="title">Zoe</div>

    <div id="chatbox"></div>

    <div class="input-area">
        <input id="inputBox" type="text" placeholder="> type here..." />
        <button onclick="sendMessage()">send</button>
    </div>
</div>

<script>
/* -------- BOOT SEQUENCE -------- */

let bootLines = [
    "initializing system...",
    "loading modules...",
    "connecting to ai core...",
    "establishing secure channel...",
    "system ready.",
    "",
    "welcome to zoe"
];

let bootEl = document.getElementById("boot");
let lineIndex = 0;

function typeBootLine() {
    if (lineIndex >= bootLines.length) {
        // switch to app
        setTimeout(() => {
            bootEl.style.display = "none";
            document.getElementById("app").style.display = "flex";
        }, 500);
        return;
    }

    let line = bootLines[lineIndex];
    let charIndex = 0;

    let typing = setInterval(() => {
        if (charIndex < line.length) {
            bootEl.innerText += line[charIndex];
            charIndex++;
        } else {
            clearInterval(typing);
            bootEl.innerText += "\n";
            lineIndex++;
            setTimeout(typeBootLine, 300);
        }
    }, 20);
}

// start boot
typeBootLine();


/* -------- CHAT -------- */

async function sendMessage() {
    let input = document.getElementById("inputBox");
    let message = input.value.trim();
    if (message === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">> ${message}</div>`;

    let thinkingId = "thinking-" + Date.now();
    chatbox.innerHTML += `<div class="bot" id="${thinkingId}">bot: [ \\ ]</div>`;

    chatbox.scrollTop = chatbox.scrollHeight;

    let frames = ["\\", "|", "/", "—"];
    let spinIndex = 0;

    let spinner = setInterval(() => {
        let el = document.getElementById(thinkingId);
        if (el) {
            el.innerText = "bot: [ " + frames[spinIndex % frames.length] + " ]";
            spinIndex++;
        }
    }, 120);

    const response = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    });

    const data = await response.json();

    clearInterval(spinner);

    let el = document.getElementById(thinkingId);
    let text = data.reply;
    el.innerText = "";

    let charIndex = 0;

    let typing = setInterval(() => {
        if (charIndex < text.length) {
            el.innerText += text[charIndex];
            charIndex++;
            chatbox.scrollTop = chatbox.scrollHeight;
        } else {
            clearInterval(typing);
        }
    }, 20);

    input.value = "";
}

// enter key
document.getElementById("inputBox")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
